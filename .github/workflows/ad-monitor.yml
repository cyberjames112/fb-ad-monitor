# CCPS Facebook Ad Library 廣告監控
# 每週一早上 9:00 (MYT = UTC+8) 自動執行
# 也可以手動觸發

name: FB Ad Monitor Weekly

on:
  schedule:
    # 每週一 UTC 01:00 = 馬來西亞/台灣 09:00
    - cron: '0 1 * * 1'
  workflow_dispatch:  # 允許手動觸發

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: 🔍 Run Ad Library Scanner
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        run: |
          python run.py

      - name: 📎 Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ad-monitor-report-${{ github.run_number }}
          path: |
            output/*.html
            output/*.json
            screenshots/*.png
          retention-days: 30
